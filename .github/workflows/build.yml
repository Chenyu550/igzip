name: Build All Modules

on:
  push:
    branches: [ "master", "main" ]
  pull_request:
    branches: [ "master", "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up JDK 11
      uses: actions/setup-java@v4
      with:
        java-version: '11'
        distribution: 'temurin'

    - name: Install cross-compile toolchain
      run: |
        sudo apt-get update
        sudo apt-get install -y mingw-w64 nasm autoconf automake libtool

    - name: Clone ISA-L source
      run: git clone https://github.com/intel/isa-l.git

    - name: Build Native Libraries (Linux .so & Windows .dll)
      run: |
        # 定义路径变量
        ISA_L_DIR="$GITHUB_WORKSPACE/isa-l"
        SRC_FILE="$GITHUB_WORKSPACE/igzip-java/src/main/c/igzip_jni.c"
        JNI_INC="$JAVA_HOME/include"
        
        # --- 1. 编译 Linux x64 版本 ---
        cd $ISA_L_DIR
        ./autogen.sh
        CFLAGS="-O3 -fPIC -flto" ./configure
        make -j$(nproc)
        
        # 链接生成 .so (注意使用绝对路径指定源文件)
        gcc -shared -s -O3 -fPIC -flto \
          -I include/ -I $JNI_INC/ -I $JNI_INC/linux/ \
          $SRC_FILE .libs/libisal.a \
          -o $GITHUB_WORKSPACE/libigzip_jni.so
        
        # 清理 ISA-L 构建产物，准备编译 Windows 版本
        make clean

        # --- 2. 编译 Windows x64 版本 ---
        CFLAGS="-O3 -fPIC" ./configure --host=x86_64-w64-mingw32
        make -j$(nproc)
        
        # 链接生成 .dll (注意：Windows JNI 头文件在 win32/ 目录下)
        x86_64-w64-mingw32-gcc -shared -s -O3 -fPIC \
          -I include/ -I $JNI_INC/ -I $JNI_INC/win32/ \
          $SRC_FILE .libs/libisal.a \
          -o $GITHUB_WORKSPACE/igzip_jni.dll

    - name: Prepare resources for Maven modules
      run: |
        mkdir -p igzip-linux-amd64/src/main/resources/native
        mkdir -p igzip-windows-amd64/src/main/resources/native
        
        cp libigzip_jni.so igzip-linux-amd64/src/main/resources/native/
        cp igzip_jni.dll igzip-windows-amd64/src/main/resources/native/

    - name: Build and Install to Local Maven Repo
      run: mvn install -DskipTests

    - name: Package Maven Repository
      run: |
        cd ~/.m2/repository
        tar -czf $GITHUB_WORKSPACE/maven-repo-all.tar.gz com/github/caoli5288

    - name: Upload Maven Repo Artifact
      uses: actions/upload-artifact@v4
      with:
        name: maven-repo-all
        path: maven-repo-all.tar.gz
