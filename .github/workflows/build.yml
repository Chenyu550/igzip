name: Build All Modules

on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]
  workflow_dispatch:  # 手动触发

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        submodules: recursive
    
    - name: Set up JDK 11
      uses: actions/setup-java@v3
      with:
        java-version: '11'
        distribution: 'temurin'
        cache: maven
    
    - name: Install cross-compilation tools
      run: |
        sudo apt-get update
        sudo apt-get install -y gcc-mingw-w64-x86-64 gcc-mingw-w64-i686
    
    - name: Build native libraries
      run: |
        chmod +x build.sh
        # 修改 build.sh 中的 JNI 路径为 GitHub Actions 环境
        sed -i 's|JNI_INCLUDE=.*|JNI_INCLUDE="/usr/lib/jvm/java-11-openjdk-amd64/include"|g' build.sh
        ./build.sh
    
    - name: Build with Maven
      run: mvn clean install -DskipTests
    
    - name: Prepare release artifacts
      run: |
        mkdir -p release-artifacts
        
        # 复制所有 JAR 文件
        find . -name '*.jar' -exec cp {} release-artifacts/ \;
        
        # 复制本地库文件
        find . -name '*.so' -exec cp {} release-artifacts/ \;
        find . -name '*.dll' -exec cp {} release-artifacts/ \;
        
        # 创建 POM 文件集合
        find . -name 'pom.xml' -exec cp {} release-artifacts/ \;
        
        # 创建安装脚本
        cat > release-artifacts/install-to-local-maven.bat << 'EOF'
        @echo off
        echo Installing igzip-java to local Maven repository...
        
        set GROUP_ID=com.github.caoli5288.igzip
        set VERSION=0.2-SNAPSHOT
        
        echo Installing parent POM...
        call mvn install:install-file -Dfile=pom.xml -DgroupId=%GROUP_ID% -DartifactId=igzip -Dversion=%VERSION% -Dpackaging=pom
        
        echo Installing igzip-java...
        call mvn install:install-file -Dfile=igzip-java-0.2-SNAPSHOT.jar -DgroupId=%GROUP_ID% -DartifactId=igzip-java -Dversion=%VERSION% -Dpackaging=jar -DpomFile=igzip-java/pom.xml
        
        echo Installing igzip-linux-amd64...
        call mvn install:install-file -Dfile=igzip-linux-amd64-0.2-SNAPSHOT.jar -DgroupId=%GROUP_ID% -DartifactId=igzip-linux-amd64 -Dversion=%VERSION% -Dpackaging=jar -DpomFile=igzip-linux-amd64/pom.xml
        
        echo Installing igzip-windows-amd64...
        call mvn install:install-file -Dfile=igzip-windows-amd64-0.2-SNAPSHOT.jar -DgroupId=%GROUP_ID% -DartifactId=igzip-windows-amd64 -Dversion=%VERSION% -Dpackaging=jar -DpomFile=igzip-windows-amd64/pom.xml
        
        echo Installing igzip-all...
        call mvn install:install-file -Dfile=igzip-all-0.2-SNAPSHOT.jar -DgroupId=%GROUP_ID% -DartifactId=igzip-all -Dversion=%VERSION% -Dpackaging=jar -DpomFile=igzip-all/pom.xml
        
        echo Installation completed successfully!
        pause
        EOF
    
    - name: Upload build artifacts
      uses: actions/upload-artifact@v4
      with:
        name: igzip-build-artifacts
        path: release-artifacts/
    
    - name: Create Release
      if: github.event_name == 'push' && github.ref == 'refs/heads/master'
      uses: softprops/action-gh-release@v1
      with:
        tag_name: v0.2-SNAPSHOT-${{ github.sha }}
        name: Build ${{ github.sha }}
        files: release-artifacts/*
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
