name: Build All Modules

on:
  workflow_dispatch:   # 手动触发
  push:
    branches: [ master ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # ── 1. 拉取代码 ──────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      # ── 2. 安装系统工具 ───────────────────────────────────────────
      - name: Install build dependencies
        run: |
          sudo apt-get update -y
          sudo apt-get install -y \
            build-essential cmake nasm autoconf automake libtool \
            mingw-w64

      # ── 3. 从源码编译安装 Intel ISA-L (libisal) ───────────────────
      #      GitHub Actions 的 ubuntu-latest 没有预装 libisal，
      #      apt 源里也没有此版本，必须从源码自行编译
      - name: Build & install Intel ISA-L from source
        run: |
          git clone --depth=1 https://github.com/intel/isa-l.git /tmp/isa-l
          cd /tmp/isa-l
          ./autogen.sh
          ./configure --prefix=/usr
          make -j$(nproc)
          sudo make install
          sudo ldconfig
          # 验证 pkg-config 能找到 libisal
          pkg-config --modversion libisal

      # ── 4. 配置 JDK ──────────────────────────────────────────────
      - name: Set up JDK 11
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '11'

      # ── 5. 编译 Linux 原生库（igzip_jni.so）─────────────────────
      - name: Build Linux native library
        run: |
          mkdir -p build-linux && cd build-linux
          cmake .. -DCMAKE_BUILD_TYPE=Release
          make -j$(nproc)
          echo "=== Built .so files ==="
          find . -name "*.so" -o -name "*.so.*"
          # 复制到 Maven 资源目录
          mkdir -p ../igzip-linux-amd64/src/main/resources/native/
          find . -name "*.so" -exec cp {} \
            ../igzip-linux-amd64/src/main/resources/native/ \;

      # ── 6. 交叉编译 Windows 原生库（igzip_jni.dll）──────────────
      #      先为 mingw 单独编译一份 isa-l 静态库，再用它链接 DLL
      - name: Build isa-l Windows static library (cross-compile)
        run: |
          cd /tmp/isa-l
          make -f Makefile.unx \
            CC=x86_64-w64-mingw32-gcc \
            AR=x86_64-w64-mingw32-ar \
            CFLAGS_="-DWIN_ABI" \
            libe || true

      - name: Build Windows native library (cross-compile)
        run: |
          mkdir -p build-win && cd build-win
          cmake .. \
            -DCMAKE_SYSTEM_NAME=Windows \
            -DCMAKE_C_COMPILER=x86_64-w64-mingw32-gcc \
            -DCMAKE_BUILD_TYPE=Release \
            -DISAL_INCLUDE_DIRS=/tmp/isa-l/include \
            -DISAL_LIBRARIES=/tmp/isa-l/libisal.a \
            || echo "Windows cross-compile cmake failed, skipping"
          make -j$(nproc) || echo "Windows cross-compile make failed, skipping"
          echo "=== Built .dll files ==="
          find . -name "*.dll" 2>/dev/null || echo "No DLL found (non-fatal)"
          mkdir -p ../igzip-windows-amd64/src/main/resources/native/
          find . -name "*.dll" -exec cp {} \
            ../igzip-windows-amd64/src/main/resources/native/ \; 2>/dev/null || true

      # ── 7. Maven 构建并安装所有模块到本地仓库 ────────────────────
      - name: Maven build & install all modules
        run: |
          mvn clean install -B \
            -DskipTests \
            --no-transfer-progress

      # ── 8. 收集产物到 dist/ 目录 ──────────────────────────────────
      - name: Collect Maven artifacts
        run: |
          mkdir -p dist
          for module in igzip-java igzip-linux-amd64 igzip-windows-amd64 igzip-all; do
            if [ -d "$module/target" ]; then
              cp $module/target/*.jar dist/ 2>/dev/null || true
              cp $module/pom.xml dist/${module}.pom 2>/dev/null || true
            fi
          done
          cp pom.xml dist/igzip-parent.pom
          echo "=== dist contents ==="
          ls -lh dist/

      # ── 9. 上传散装 JAR + POM（方便逐个手动安装）────────────────
      - name: Upload JAR artifacts
        uses: actions/upload-artifact@v4
        with:
          name: igzip-maven-jars
          path: dist/
          retention-days: 30

      # ── 10. 打包完整 m2 仓库目录（解压即用，最推荐方式）────────
      - name: Package local m2 repository
        run: |
          tar -czf igzip-m2-repo.tar.gz \
            -C ~/.m2/repository \
            com/github/caoli5288/
          echo "=== tar contents ==="
          tar -tzf igzip-m2-repo.tar.gz

      - name: Upload full m2 repo snapshot
        uses: actions/upload-artifact@v4
        with:
          name: igzip-m2-repo
          path: igzip-m2-repo.tar.gz
          retention-days: 30
