name: Build All Modules

on:
  push:
    branches: [ "master", "main" ]
  pull_request:
    branches: [ "master", "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up JDK 11
      uses: actions/setup-java@v4
      with:
        java-version: '11'
        distribution: 'temurin'

    - name: Install cross-compile toolchain
      run: |
        sudo apt-get update
        sudo apt-get install -y mingw-w64 nasm autoconf automake libtool

    - name: Clone ISA-L source
      run: git clone https://github.com/intel/isa-l.git

    - name: Build Native Libraries (Linux .so & Windows .dll)
      run: |
        # 定义路径
        ISA_L_DIR="$GITHUB_WORKSPACE/isa-l"
        SRC_FILE="$GITHUB_WORKSPACE/igzip-java/src/main/c/igzip_jni.c"
        JNI_INC="$JAVA_HOME/include"
        
        # --- 1. 编译 Linux x64 版本 ---
        cd $ISA_L_DIR
        ./autogen.sh
        CFLAGS="-O3 -fPIC -flto" ./configure
        make -j$(nproc)
        
        # 关键修正：代码里写的是 <isa-l/igzip_lib.h>，所以需要把 isa-l 目录本身加入包含路径
        # -I. (当前目录 isa-l/) 意味着编译器会查找 ./isa-l/igzip_lib.h (即 include/isa-l/igzip_lib.h 的软链接或实际路径)
        # 更稳妥的方式是 -I./include，因为生成的头文件在那里。
        # 实际上 ISA-L 的 Makefile 会把头文件生成到 include/ 下。
        # 而 include/ 下通常有 igzip_lib.h，但没有 isa-l/ 这个子目录。
        # 如果源码强制要求 <isa-l/xxx.h>，我们需要建立一个软链接或者在包含路径上做文章。
        
        # 检查 include 目录结构
        ls -R include/
        
        # 假设头文件在 include/，我们需要让编译器认为有 isa-l/ 这一层
        # 或者，如果 igzip_jni.c 可以修改，最好的办法是改源码。
        # 但既然是编译现有仓库，我们尝试用包含路径解决。
        # 注意：ISA-L 编译后，头文件通常在 include/ 根目录。
        # 如果代码一定要 <isa-l/igzip_lib.h>，我们需要在 include/ 下创建 isa-l 软链接指向当前目录？
        # 或者更简单的：如果代码实际上是在找 isa-l 这个文件夹下的头文件。
        
        # 让我们查看一下原作者的 build.sh 是怎么处理的。
        # 原作者 build.sh: gcc ... -I include/
        # 如果原作者能编译通过，说明 include/ 下应该有 isa-l/ 目录，或者源码不一样。
        # 让我们尝试在 include/ 下创建软链接指向父目录，以模拟 isa-l/ 目录结构
        cd include
        ln -s . isa-l
        cd ..
        
        # 现在编译 Linux 版本
        gcc -shared -s -O3 -fPIC -flto \
          -I include/ -I $JNI_INC/ -I $JNI_INC/linux/ \
          $SRC_FILE .libs/libisal.a \
          -o $GITHUB_WORKSPACE/libigzip_jni.so
        
        # 清理并准备 Windows 版本
        make clean
        cd include && rm isa-l && cd ..

        # --- 2. 编译 Windows x64 版本 ---
        CFLAGS="-O3 -fPIC" ./configure --host=x86_64-w64-mingw32
        make -j$(nproc)
        
        # 同样处理 Windows 版的头文件链接
        cd include
        ln -s . isa-l
        cd ..
        
        x86_64-w64-mingw32-gcc -shared -s -O3 -fPIC \
          -I include/ -I $JNI_INC/ -I $JNI_INC/win32/ \
          $SRC_FILE .libs/libisal.a \
          -o $GITHUB_WORKSPACE/igzip_jni.dll

    - name: Prepare resources for Maven modules
      run: |
        mkdir -p igzip-linux-amd64/src/main/resources/native
        mkdir -p igzip-windows-amd64/src/main/resources/native
        
        cp libigzip_jni.so igzip-linux-amd64/src/main/resources/native/
        cp igzip_jni.dll igzip-windows-amd64/src/main/resources/native/

    - name: Build and Install to Local Maven Repo
      run: mvn install -DskipTests

    - name: Package Maven Repository
      run: |
        cd ~/.m2/repository
        tar -czf $GITHUB_WORKSPACE/maven-repo-all.tar.gz com/github/caoli5288

    - name: Upload Maven Repo Artifact
      uses: actions/upload-artifact@v4
      with:
        name: maven-repo-all
        path: maven-repo-all.tar.gz
