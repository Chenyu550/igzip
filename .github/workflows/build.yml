name: Build All Modules

# .github/workflows/build-and-release.yml
# 将此文件放入你 fork 的仓库的 .github/workflows/ 目录下

on:
  workflow_dispatch:   # 手动触发
  push:
    branches: [ master ]

jobs:
  # ────────────────────────────────────────────
  # 1. 在 Linux 上编译本地库 + 所有 Maven 模块
  # ────────────────────────────────────────────
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      # ── JDK ──
      - name: Set up JDK 11
        uses: actions/setup-java@v4
        with:
          java-version: '11'
          distribution: 'temurin'

      # ── 系统依赖（nasm 是 igzip 汇编加速所必须的）──
      - name: Install build dependencies
        run: |
          sudo apt-get update -y
          sudo apt-get install -y \
            cmake \
            nasm \
            gcc \
            g++ \
            make

      # ── 编译 C/JNI 本地库（生成 .so） ──
      - name: Build native library (CMake)
        run: |
          mkdir -p build
          cd build
          cmake .. -DCMAKE_BUILD_TYPE=Release
          make -j$(nproc)
          echo "=== Native libs ==="
          find . -name "*.so" -o -name "*.dll" | head -30

      # ── 把编译好的 .so 拷贝到 Maven 资源目录 ──
      # （根据仓库惯例，linux amd64 的 so 放在 igzip-linux-amd64/src/main/resources/）
      - name: Copy native .so into Maven resource dir
        run: |
          SO=$(find build -name "libigzip*.so" | head -1)
          if [ -z "$SO" ]; then
            echo "WARNING: no .so found, trying fallback name"
            SO=$(find build -name "*.so" | head -1)
          fi
          echo "Using native lib: $SO"
          RESOURCE_DIR="igzip-linux-amd64/src/main/resources/native/linux/amd64"
          mkdir -p "$RESOURCE_DIR"
          cp "$SO" "$RESOURCE_DIR/"

      # ── Maven 编译 + install 所有模块到本地缓存 ──
      - name: Maven build all modules
        run: |
          mvn clean install -DskipTests -B \
            --no-transfer-progress

      # ── 收集所有产物 JAR ──
      - name: Collect JARs
        run: |
          mkdir -p dist
          # 复制所有子模块的 target/*.jar（排除 sources/javadoc）
          find . -path "*/target/*.jar" \
            ! -name "*-sources.jar" \
            ! -name "*-javadoc.jar" \
            -exec cp {} dist/ \;
          echo "=== Collected JARs ==="
          ls -lh dist/

      # ── 同时打包整个 ~/.m2/repository/com/github/caoli5288 供离线使用 ──
      - name: Package local Maven repository
        run: |
          REPO_DIR="$HOME/.m2/repository/com/github/caoli5288"
          if [ -d "$REPO_DIR" ]; then
            tar -czf dist/igzip-maven-repo.tar.gz -C "$HOME/.m2/repository" com/github/caoli5288
            echo "Packaged maven repo:"
            ls -lh dist/igzip-maven-repo.tar.gz
          else
            echo "Maven repo dir not found at $REPO_DIR"
            find ~/.m2 -path "*caoli5288*" | head -20
          fi

      # ── 上传为 Actions Artifact（无需 Release，直接下载）──
      - name: Upload JARs as workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: igzip-jars
          path: dist/
          retention-days: 30

  # ────────────────────────────────────────────
  # 2. 创建 GitHub Release 并附上所有文件
  # ────────────────────────────────────────────
  release:
    needs: build
    runs-on: ubuntu-22.04
    permissions:
      contents: write   # 允许创建 Release

    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: igzip-jars
          path: dist/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: snapshot-${{ github.run_number }}
          name: "igzip SNAPSHOT Build #${{ github.run_number }}"
          body: |
            自动构建的 igzip Maven 依赖包。

            ### 包含文件
            - `igzip-all-*.jar` — 全平台 fat jar（推荐使用）
            - `igzip-java-*.jar` — 纯 Java 接口层
            - `igzip-linux-amd64-*.jar` — Linux x64 本地库
            - `igzip-windows-amd64-*.jar` — Windows x64 本地库
            - `igzip-maven-repo.tar.gz` — 本地 Maven 仓库压缩包（解压后可直接使用）

            ### 安装到 Windows 本地库
            见 README 说明。
          files: dist/*
          draft: false
          prerelease: true
