name: Build All Modules

on:
  workflow_dispatch:   # 手动触发
  push:
    branches: [ master ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # ── 1. 拉取代码 ──────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive   # igzip 使用了 git submodule（isa-l）

      # ── 2. 安装编译 C 原生库所需工具 ─────────────────────────────
      - name: Install native build dependencies
        run: |
          sudo apt-get update -y
          sudo apt-get install -y \
            build-essential cmake nasm \
            mingw-w64          # 交叉编译 Windows DLL

      # ── 3. 配置 JDK ──────────────────────────────────────────────
      - name: Set up JDK 11
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '11'

      # ── 4. 编译 Linux 原生库（igzip_jni.so）────────────────────────
      - name: Build Linux native library
        run: |
          mkdir -p build-linux && cd build-linux
          cmake .. -DCMAKE_BUILD_TYPE=Release
          make -j$(nproc)
          # 将生成的 .so 复制到 Maven 资源目录
          find . -name "*.so" -exec cp {} \
            ../igzip-linux-amd64/src/main/resources/native/ \;

      # ── 5. 交叉编译 Windows 原生库（igzip_jni.dll）──────────────────
      - name: Build Windows native library (cross-compile)
        run: |
          mkdir -p build-win && cd build-win
          cmake .. \
            -DCMAKE_TOOLCHAIN_FILE=../cmake/Toolchain-mingw64.cmake \
            -DCMAKE_BUILD_TYPE=Release || true
          # 如果项目未提供 toolchain 文件，用下面的备用方式
          if [ ! -f ../cmake/Toolchain-mingw64.cmake ]; then
            cmake .. \
              -DCMAKE_SYSTEM_NAME=Windows \
              -DCMAKE_C_COMPILER=x86_64-w64-mingw32-gcc \
              -DCMAKE_BUILD_TYPE=Release
          fi
          make -j$(nproc) || true
          find . -name "*.dll" -exec cp {} \
            ../igzip-windows-amd64/src/main/resources/native/ \; 2>/dev/null || true

      # ── 6. Maven 构建所有模块 ─────────────────────────────────────
      - name: Maven build all modules
        run: |
          mvn clean package -B \
            -DskipTests \
            --no-transfer-progress

      # ── 7. 将所有模块的 JAR 及 POM 收集到统一目录 ─────────────────
      - name: Collect Maven artifacts
        run: |
          mkdir -p dist
          # 收集各模块产物
          for module in igzip-java igzip-linux-amd64 igzip-windows-amd64 igzip-all; do
            if [ -d "$module/target" ]; then
              cp $module/target/*.jar dist/ 2>/dev/null || true
              cp $module/pom.xml dist/${module}.pom 2>/dev/null || true
            fi
          done
          ls -lh dist/

      # ── 8. 上传产物（可在 Actions 页面下载）──────────────────────
      - name: Upload JAR artifacts
        uses: actions/upload-artifact@v4
        with:
          name: igzip-maven-jars
          path: dist/
          retention-days: 30   # 保留 30 天

      # ── 9. （可选）同时上传完整 Maven 本地仓库 ────────────────────
      - name: Maven install to local repo & package it
        run: |
          mvn install -B -DskipTests --no-transfer-progress
          # 打包 ~/.m2/repository/com/github/caoli5288/
          tar -czf igzip-m2-repo.tar.gz \
            -C ~/.m2/repository \
            com/github/caoli5288/igzip* 2>/dev/null || \
          tar -czf igzip-m2-repo.tar.gz \
            -C ~/.m2/repository \
            com/github/caoli5288/

      - name: Upload full m2 repo snapshot
        uses: actions/upload-artifact@v4
        with:
          name: igzip-m2-repo
          path: igzip-m2-repo.tar.gz
          retention-days: 30
      uses: actions/upload-artifact@v4
      with:
        name: maven-repo-all
        path: maven-repo-all.tar.gz
